name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - freebsd_version: "13.5"
            rust_version: nightly
            target: x86_64-unknown-freebsd
            arch: x86_64
          - freebsd_version: "14.4"
            rust_version: nightly
            target: x86_64-unknown-freebsd
            arch: x86_64
          - freebsd_version: "15.0"
            rust_version: nightly
            target: x86_64-unknown-freebsd
            arch: x86_64
          - freebsd_version: "14.4"
            rust_version: nightly
            target: i686-unknown-freebsd
            arch: i686
    name: FreeBSD/${{ matrix.arch }} ${{ matrix.freebsd_version }} ${{ matrix.rust_version }}
    steps:
      - uses: actions/checkout@v6
      - name: Start VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.freebsd_version }}
          usesh: true
      - name: Install dependencies
        shell: freebsd {0}
        run: |
          pkg install -y curl llvm
          fetch https://sh.rustup.rs -o rustup.sh
          sh rustup.sh -y --profile=minimal --default-toolchain ${{ matrix.rust_version }} --target ${{ matrix.target }}
      - name: Test
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cargo test --no-default-features --target ${{ matrix.target }}
          cargo test --all-features --target ${{ matrix.target }}
      - name: Doc
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cargo doc --no-deps --all-features --target ${{ matrix.target }}

  msrv:
    runs-on: ubuntu-latest
    name: FreeBSD 14.4 MSRV
    steps:
      - uses: actions/checkout@v6
      - name: Start VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          usesh: true
      - name: Install dependencies
        shell: freebsd {0}
        run: |
          pkg install -y curl llvm
          fetch https://sh.rustup.rs -o rustup.sh
          sh rustup.sh -y --profile=minimal --default-toolchain 1.81.0
      - name: Setup
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cargo +1.81.0 update
          cargo +1.81.0 update -p home --precise 0.5.11
      - name: Check
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cargo +1.81.0 check --no-default-features
          cargo +1.81.0 check --all-features

  lint:
    runs-on: ubuntu-latest
    name: lint
    steps:
      - uses: actions/checkout@v6
      - name: Start VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          usesh: true
      - name: Install dependencies
        shell: freebsd {0}
        run: |
          pkg install -y curl llvm
          fetch https://sh.rustup.rs -o rustup.sh
          sh rustup.sh -y --profile=minimal --default-toolchain nightly
      - name: Setup
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          rustup component add --toolchain nightly clippy
          rustup component add --toolchain nightly rustfmt
          pkg install -y cargo-audit
      - name: Clippy
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cargo +nightly clippy --all-targets --no-default-features -- -D warnings
          cargo +nightly clippy --all-targets --all-features -- -D warnings
      - name: Fmt
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cargo +nightly fmt --all -- --check --color=never
      - name: Audit
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cargo audit
      - name: Minver
        shell: freebsd {0}
        run: |
          . $HOME/.cargo/env
          cargo +nightly update -Zdirect-minimal-versions
          cargo +nightly check --all-targets --all-features

  cross-docs:
    name: Cross docs
    runs-on: ubuntu-latest
    container:
      image: rustlang/rust:nightly
    env:
      RUSTFLAGS: --cfg docsrs
      RUSTDOCFLAGS: --cfg docsrs
    steps:
      - uses: actions/checkout@v6
      - name: Cross compile docs
        run: |
          rustup target add x86_64-unknown-freebsd
          cargo doc --target x86_64-unknown-freebsd --no-deps --all-features
